<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Hệ Thống Tải File</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 380px; border-top: 5px solid #1976d2; }
        h2 { color: #1976d2; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #546e7a; margin-bottom: 1.5rem; font-size: 14px; }
        input { width: 100%; padding: 14px; margin-bottom: 1.2rem; border: 2px solid #cfd8dc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #1976d2; box-shadow: 0 0 8px rgba(25, 118, 210, 0.2); }
        button { width: 100%; padding: 14px; background: #1976d2; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1565c0; transform: translateY(-1px); }
        .footer { margin-top: 1.5rem; font-size: 12px; color: #90a4ae; border-top: 1px solid #eee; pt: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>BLOCK-POPUP</h2>
    <p>Vui lòng nhập mã xác nhận để mở khóa link tải</p>
    
    <input type="text" id="userInput" placeholder="Nhập Serial Number để tiếp tục..." autofocus>
    
    <button onclick="processAccess()">XÁC NHẬN TẢI FILE</button>
    
    <div class="footer">
        Hỗ trợ kỹ thuật: 0868034677 <br>
       
    </div>
</div>

<script>
    function processAccess() {
        // Lấy giá trị, dùng trim() để bỏ khoảng trắng thừa
        const val = document.getElementById('userInput').value.trim();
        
        // --- THAY LINK GỐC CỦA BẠN VÀO ĐÂY ---
        const targetLink = "https://tinyurl.com/blockpopupv1"; 
        // -------------------------------------

        // Kiểm tra: Chỉ cần có nhập (độ dài > 0) là cho qua
        if (val.length > 0) {
            // Hiệu ứng giả lập đang kiểm tra cho chuyên nghiệp
            const btn = document.querySelector('button');
            btn.innerHTML = "ĐANG KIỂM TRA...";
            btn.style.background = "#4527a0";
            
            setTimeout(() => {
                window.location.href = targetLink;
            }, 800); // Đợi 0.8 giây rồi mới chuyển link cho khách hồi hộp
        } else {
            alert("Bạn chưa nhập mã xác nhận! Vui lòng nhập để tiếp tục.");
            document.getElementById('userInput').focus();
        }
    }

    // Nhấn Enter để gửi cho nhanh
    document.getElementById("userInput").addEventListener("keyup", function(event) {
        if (event.keyCode === 13) {
            processAccess();
        }
    });
</script>

</body>
</html>
